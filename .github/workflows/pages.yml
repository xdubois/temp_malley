name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # A poll commit is pushed with GITHUB_TOKEN, which by design does NOT fire the
  # push trigger above — so rebuild when the poll workflow finishes instead.
  workflow_run:
    workflows: ["Poll SwitchBot sensor"]
    types: [completed]

# Permissions the deploy-pages action needs
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build the dashboard
        run: uv run build_dashboard.py

      - name: Assemble the site (dashboard as index.html)
        run: |
          mkdir -p _site
          cp temperature_dashboard.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
